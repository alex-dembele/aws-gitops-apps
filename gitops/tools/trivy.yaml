apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trivy-operator
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://aquasecurity.github.io/helm-charts/'
    chart: trivy-operator
    targetRevision: 0.22.0
    helm:
      values: |
        trivy:
          ignoreUnfixed: true
          severity: "CRITICAL,HIGH"
          resources:
            requests:
              cpu: 100m
              memory: 100Mi
            limits:
              cpu: 500m
              memory: 500Mi
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: trivy-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
