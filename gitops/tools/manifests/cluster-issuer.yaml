apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@example.com # À remplacer
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - dns01:
        route53:
          region: us-east-1
          # Pas besoin d'access/secret keys grâce à IRSA configuré via Terraform
          # Cert-Manager utilisera automatiquement le rôle IAM lié à son ServiceAccount
