apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: daily-cluster-backup
  namespace: velero
spec:
  schedule: "0 2 * * *" # Tous les jours à 2h00 du matin
  template:
    includedNamespaces:
      - '*'
    excludedNamespaces:
      - kube-system
    includeClusterResources: true
    snapshotVolumes: true
    ttl: 720h0m0s # 30 jours
