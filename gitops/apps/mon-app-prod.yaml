apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mon-app-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/alex-dembele/aws-gitops-apps.git'
    targetRevision: HEAD
    path: gitops/apps/mon-app/overlays/prod
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
