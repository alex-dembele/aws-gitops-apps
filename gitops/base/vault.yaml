apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://helm.releases.hashicorp.com'
    chart: vault
    targetRevision: 0.28.0
    helm:
      values: |
        server:
          # Mode standalone pour minimiser les coûts initialement
          # En production, on passerait à un backend Raft avec HA (High Availability)
          standalone:
            enabled: true
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
        ui:
          enabled: true
          serviceType: "ClusterIP"
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: vault
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
