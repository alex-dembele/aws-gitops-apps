apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://charts.jetstack.io'
    chart: cert-manager
    targetRevision: v1.14.5
    helm:
      values: |
        installCRDs: true
        serviceAccount:
          create: true
          name: cert-manager
          annotations:
            # L'ARN du rôle IAM provisionné par Terraform via IRSA
            eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/gitops-eks-cluster-cert-manager"
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
