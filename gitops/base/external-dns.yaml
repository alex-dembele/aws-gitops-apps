apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: external-dns
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
  - clusters:
      selector:
        matchExpressions:
          - key: name
            operator: Exists
  template:
    metadata:
      # L'application ArgoCD sera suffixée par le nom du cluster
      name: 'external-dns-{{.name}}'
      namespace: argocd
    spec:
      project: default
      source:
        repoURL: 'https://kubernetes-sigs.github.io/external-dns/'
        chart: external-dns
        targetRevision: 1.14.4
        helm:
          values: |
            provider: aws
            env:
              - name: AWS_REGION
                value: "us-east-1"
            serviceAccount:
              create: true
              name: external-dns
              annotations:
                # Injection DYNAMIQUE de l'ARN AWS en fonction du nom du cluster (ex: gitops-eks-cluster-stag)
                eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/{{.name}}-external-dns"
            policy: sync
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
      destination:
        server: '{{.server}}'
        namespace: kube-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
