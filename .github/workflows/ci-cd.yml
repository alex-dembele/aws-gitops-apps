name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # Remplacer par votre registry et image
  IMAGE_NAME: "votre-dockerhub-user/votre-app"
  GITOPS_REPO: "github.com/alex-dembele/aws-gitops-infrastructure.git"

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Nécessaire pour SonarQube

      - name: 2. Scan SonarQube
        uses: sonarsource/sonarqube-scan-action@v2.3.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: 3. Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 4. Build de l'image (Locale pour le scan)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true # Charge l'image dans le daemon Docker local pour Trivy
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: 5. Scan de vulnérabilités avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ github.sha }}'
          format: 'table'
          exit-code: '1' # Fait échouer le job si vulnérabilités CRITICAL trouvées
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: 6. Login to DockerHub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 7. Push sur DockerHub
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }},${{ env.IMAGE_NAME }}:latest

  update-gitops:
    needs: build-and-scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout du dépôt GitOps
        uses: actions/checkout@v4
        with:
          repository: "alex-dembele/aws-gitops-infrastructure"
          token: ${{ secrets.GITOPS_PAT }} # Personal Access Token nécessaire pour push
          path: gitops-repo

      - name: Mise à jour du tag de l'image en Staging (ArgoCD)
        run: |
          cd gitops-repo/gitops/apps/mon-app/overlays/staging
          # Utilisation de sed pour remplacer le tag dans kustomization.yaml
          sed -i "s|newTag: .*|newTag: \"${{ github.sha }}\"|g" kustomization.yaml
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kustomization.yaml
          git commit -m "ci(staging): update image tag to ${{ github.sha }}"
          git push origin main
